{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reklamani o'chirish</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center px-4" style="font-family: 'Manrope', sans-serif;">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-sm p-8 text-center">
        <div class="text-5xl mb-4">&#x26A0;&#xFE0F;</div>
        <h2 class="text-xl font-bold text-gray-900 mb-2">Reklamani o'chirish</h2>
        <p class="text-gray-500 text-sm mb-6">"<strong>{{ car.name }}</strong>" reklamasini o'chirmoqchimisiz?</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex gap-3 justify-center">
                <a href="{% url 'ads' %}" class="px-6 py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-xl text-sm font-semibold transition">Bekor qilish</a>
                <button type="submit" class="px-6 py-3 bg-red-500 hover:bg-red-600 text-white rounded-xl text-sm font-semibold transition">O'chirish</button>
            </div>
        </form>
    </div>
{% include 'partials/futer.html' %}
</body>
</html>
