<script>
{% if user.is_authenticated %}
var MY_USERNAME = '{{ user.username }}';
var MY_FIRST_NAME = '{{ user.first_name|escapejs }}';
{% if user.profile.avatar %}
var MY_AVATAR_URL = '{{ user.profile.avatar.url }}';
{% else %}
var MY_AVATAR_URL = '';
{% endif %}

// === CALL GLOBALS ===
var globalSocket = null;
var globalReconnectTimer = null;
var globalRingtoneCtx = null;
var globalRingtoneOsc = null;
var globalRingtoneGain = null;
var globalRingtoneInterval = null;
var globalPendingCaller = null;
var bannerVisible = false;
var notifiedCallId = 0;

// === WEBRTC GLOBALS ===
var gLocalStream = null;
var gPeerConnection = null;
var gIsVideoCall = false;
var gCallActive = false;
var gIsMuted = false;
var gIsCameraOn = true;
var gIsSpeakerOn = false;
var gRemoteStreamMonitor = null;

// === SMS GLOBALS ===
var seenMsgIds = {};
var smsPollTimer = null;
var smsBannerTimeout = null;
var smsCurrentMsgId = null;
var smsCurrentUsername = null;

const gIceServers = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
    ]
};

function getCSRFToken() {
    var cookies = document.cookie.split('; ');
    for (var i = 0; i < cookies.length; i++) {
        var parts = cookies[i].split('=');
        if (parts[0] === 'csrftoken') return parts[1];
    }
    return '';
}

// ==================== WEBSOCKET ====================

function getGlobalWsUrl() {
    var p = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    return p + '//' + window.location.host + '/ws/call/';
}

function connectGlobalWebSocket() {
    if (globalSocket && (globalSocket.readyState === WebSocket.OPEN || globalSocket.readyState === WebSocket.CONNECTING)) return;
    globalSocket = new WebSocket(getGlobalWsUrl());
    globalSocket.onopen = function() {
        if (globalReconnectTimer) { clearTimeout(globalReconnectTimer); globalReconnectTimer = null; }
    };
    globalSocket.onclose = function() {
        if (!globalReconnectTimer) {
            globalReconnectTimer = setTimeout(function() { connectGlobalWebSocket(); }, 3000);
        }
    };
    globalSocket.onmessage = function(event) {
        var data = JSON.parse(event.data);
        switch (data.type) {
            case 'incoming_call':
                showIncomingCallGlobal(data);
                break;
            case 'call_answered':
                gHandleCallAnswered(data);
                break;
            case 'ice_candidate':
                gHandleIceCandidate(data);
                break;
            case 'call_ended':
                gHandleRemoteEndCall(data);
                hideIncomingCallGlobal();
                break;
            case 'call_rejected':
                hideIncomingCallGlobal();
                gHandleCallEnded();
                break;
            case 'call_offer_renegotiate':
                gHandleRenegotiateOffer(data);
                break;
            case 'call_answer_renegotiate':
                gHandleRenegotiateAnswer(data);
                break;
        }
    };
}

function sendGlobalWsMessage(msg) {
    if (globalSocket && globalSocket.readyState === WebSocket.OPEN) {
        globalSocket.send(JSON.stringify(msg));
    }
}

// ==================== WEBRTC ====================

function gCreatePeerConnection(stream, targetUser) {
    gPeerConnection = new RTCPeerConnection(gIceServers);
    gPeerConnection._targetUser = targetUser || (globalPendingCaller ? globalPendingCaller.from : null);
    if (stream) {
        stream.getTracks().forEach(function(track) {
            gPeerConnection.addTrack(track, stream);
        });
    }
    gPeerConnection.onicecandidate = function(event) {
        if (event.candidate && gPeerConnection._targetUser) {
            sendGlobalWsMessage({
                type: 'ice_candidate',
                target: gPeerConnection._targetUser,
                candidate: event.candidate
            });
        }
    };
    gPeerConnection.ontrack = function(event) {
        var el = document.getElementById('global-remote-video-el');
        if (event.streams && event.streams[0]) {
            el.srcObject = event.streams[0];
            el.classList.remove('hidden');
            document.getElementById('global-call-avatar').classList.add('hidden');
        }
    };
    gPeerConnection.oniceconnectionstatechange = function() {
        if (gPeerConnection.iceConnectionState === 'failed') {
            gEndCall();
        }
    };
    gPeerConnection.onsignalingstatechange = function() {
        if (gPeerConnection.signalingState === 'closed') {
            gEndCall();
        }
    };
    return gPeerConnection;
}

function gStartRemoteStreamMonitor() {
    if (gRemoteStreamMonitor) clearInterval(gRemoteStreamMonitor);
    var count = 0;
    gRemoteStreamMonitor = setInterval(function() {
        if (!gCallActive || !gPeerConnection) { clearInterval(gRemoteStreamMonitor); gRemoteStreamMonitor = null; return; }
        count++;
        var el = document.getElementById('global-remote-video-el');
        if (el.srcObject) {
            var hasV = el.srcObject.getVideoTracks().length > 0;
            var hasA = el.srcObject.getAudioTracks().length > 0;
            if (hasV || hasA) {
                el.classList.remove('hidden');
                document.getElementById('global-call-avatar').classList.add('hidden');
                if (hasV) document.getElementById('global-call-status').textContent = "Qo'ng'iroq davom etmoqda...";
            }
        }
        if (count > 60) clearInterval(gRemoteStreamMonitor);
    }, 1000);
}

function gHandleCallAnswered(data) {
    if (!gPeerConnection) return;
    document.getElementById('global-call-status').textContent = "Qo'ng'iroq davom etmoqda...";
    gPeerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp))
        .then(function() { gStartRemoteStreamMonitor(); })
        .catch(function() {});
}

function gHandleIceCandidate(data) {
    if (gPeerConnection && data.candidate) {
        gPeerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)).catch(function() {});
    }
}

function gHandleRenegotiateOffer(data) {
    if (!gPeerConnection || !gCallActive) return;
    var target = data.from;
    gPeerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp))
        .then(function() { return gPeerConnection.createAnswer(); })
        .then(function(answer) { return gPeerConnection.setLocalDescription(answer); })
        .then(function() {
            if (target) {
                sendGlobalWsMessage({ type: 'call_answer_renegotiate', target: target, sdp: gPeerConnection.localDescription });
            }
        })
        .catch(function() {});
}

function gHandleRenegotiateAnswer(data) {
    if (!gPeerConnection || !gCallActive) return;
    gPeerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp)).catch(function() {});
}

function gHandleRemoteEndCall(data) {
    gHandleCallEnded();
}

function gHandleCallEnded() {
    gCleanupCall();
    document.getElementById('global-call-overlay').classList.add('hidden');
    document.getElementById('global-local-video').classList.add('hidden');
    document.getElementById('global-remote-video-el').classList.add('hidden');
    document.getElementById('global-call-avatar').classList.remove('hidden');
}

function gCleanupCall() {
    gCallActive = false;
    if (gRemoteStreamMonitor) { clearInterval(gRemoteStreamMonitor); gRemoteStreamMonitor = null; }
    if (gPeerConnection) { gPeerConnection.close(); gPeerConnection = null; }
    if (gLocalStream) { gLocalStream.getTracks().forEach(function(t) { t.stop(); }); gLocalStream = null; }
    gIsMuted = false; gIsCameraOn = true;
    var mb = document.getElementById('g-mute-btn'); if (mb) { mb.classList.remove('bg-red-500'); mb.classList.add('bg-white/20'); }
    var cb = document.getElementById('g-camera-btn'); if (cb) { cb.classList.remove('bg-red-500'); cb.classList.add('bg-white/20'); }
    var sb = document.getElementById('g-speaker-btn'); if (sb) { sb.classList.remove('bg-blue-500'); sb.classList.add('bg-white/20'); }
}

function gEndCall() {
    var target = gPeerConnection ? (gPeerConnection._targetUser || null) : null;
    if (!target && globalPendingCaller) target = globalPendingCaller.from;
    if (target) {
        sendGlobalWsMessage({ type: 'call_end', target: target });
    }
    stopGlobalRingtone();
    gCleanupCall();
    document.getElementById('global-call-overlay').classList.add('hidden');
    document.getElementById('global-local-video').classList.add('hidden');
    document.getElementById('global-remote-video-el').classList.add('hidden');
    document.getElementById('global-call-avatar').classList.remove('hidden');
}

function gToggleMute() {
    if (gLocalStream) {
        gIsMuted = !gIsMuted;
        gLocalStream.getAudioTracks().forEach(function(t) { t.enabled = !gIsMuted; });
        var btn = document.getElementById('g-mute-btn');
        if (btn) { btn.classList.toggle('bg-red-500'); btn.classList.toggle('bg-white/20'); }
    }
}

function gToggleCamera() {
    if (!gLocalStream) return;
    var tracks = gLocalStream.getVideoTracks();
    if (tracks.length > 0) {
        gIsCameraOn = !gIsCameraOn;
        tracks.forEach(function(t) { t.enabled = gIsCameraOn; });
        var btn = document.getElementById('g-camera-btn');
        if (btn) { btn.classList.toggle('bg-red-500'); btn.classList.toggle('bg-white/20'); }
        var el = document.getElementById('global-local-video');
        if (el) el.classList.toggle('hidden');
    }
}

function gToggleSpeaker() {
    gIsSpeakerOn = !gIsSpeakerOn;
    var btn = document.getElementById('g-speaker-btn');
    if (btn) { btn.classList.toggle('bg-blue-500'); btn.classList.toggle('bg-white/20'); }
}

// ==================== CALL NOTIFICATION ====================

function showDesktopNotification(data) {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') {
        var title = (data.from_name || data.from) + ' qo\'ng\'iroq qilmoqda';
        var body = data.is_video ? 'Video qo\'ng\'iroq' : 'Audio qo\'ng\'iroq';
        var notif = new Notification(title, {
            body: body,
            icon: data.from_avatar || '',
            tag: 'call-' + data.from,
            requireInteraction: true
        });
        notif.onclick = function() {
            window.focus();
            globalAcceptCall();
            notif.close();
        };
    } else if (Notification.permission !== 'denied') {
        Notification.requestPermission();
    }
}

function showIncomingCallGlobal(data) {
    data._id = ++notifiedCallId;
    globalPendingCaller = data;

    var banner = document.getElementById('call-top-banner');
    document.getElementById('banner-caller-name').textContent = data.from_name || data.from;
    var label = data.is_video ? 'Video qo\'ng\'iroq...' : 'Audio qo\'ng\'iroq...';
    document.getElementById('banner-call-type').innerHTML = '<i class="fa-solid fa-' + (data.is_video ? 'video' : 'phone') + ' mr-1"></i>' + label;
    var bImg = document.getElementById('banner-caller-img');
    var bLetter = document.getElementById('banner-caller-letter');
    if (data.from_avatar) {
        bImg.src = data.from_avatar; bImg.classList.remove('hidden'); bLetter.classList.add('hidden');
    } else {
        bImg.classList.add('hidden'); bLetter.classList.remove('hidden');
        bLetter.style.display = 'flex'; bLetter.textContent = (data.from_name || data.from).charAt(0).toUpperCase();
    }
    banner.classList.remove('hidden');
    banner.style.transform = 'translateY(0)';
    bannerVisible = true;

    // Full overlay for non-chat pages
    var isChat = window.location.pathname.indexOf('/chat/') !== -1;
    if (!isChat) {
        var ov = document.getElementById('global-incoming-call');
        document.getElementById('global-caller-name').textContent = data.from_name || data.from;
        document.getElementById('global-caller-username').textContent = '@' + data.from;
        var oImg = document.getElementById('global-caller-avatar-img');
        var oLet = document.getElementById('global-caller-avatar-letter');
        if (data.from_avatar) {
            oImg.src = data.from_avatar; oImg.classList.remove('hidden'); oLet.classList.add('hidden');
        } else {
            oImg.classList.add('hidden'); oLet.classList.remove('hidden');
            oLet.style.display = 'flex'; oLet.textContent = (data.from_name || data.from).charAt(0).toUpperCase();
        }
        var ic = data.is_video ? 'video' : 'phone';
        document.getElementById('global-call-type').innerHTML = '<i class="fa-solid fa-' + ic + ' mr-1"></i>' + label;
        ov.classList.remove('hidden');
    }

    if (!data.silent) startGlobalRingtone();
    showDesktopNotification(data);

    setTimeout(function() {
        if (globalPendingCaller && globalPendingCaller._id === data._id) {
            hideIncomingCallGlobal();
        }
    }, 30000);
}

function hideIncomingCallGlobal() {
    var banner = document.getElementById('call-top-banner');
    banner.style.transform = 'translateY(-100%)';
    setTimeout(function() { banner.classList.add('hidden'); }, 300);
    bannerVisible = false;
    document.getElementById('global-incoming-call').classList.add('hidden');
    stopGlobalRingtone();
    if (!gCallActive) globalPendingCaller = null;
}

function globalAcceptCall() {
    stopGlobalRingtone();
    var data = globalPendingCaller;
    if (!data) { hideIncomingCallGlobal(); return; }

    gIsVideoCall = data.is_video;
    gCallActive = true;
    hideIncomingCallGlobal();

    var overlay = document.getElementById('global-call-overlay');
    overlay.classList.remove('hidden');
    document.getElementById('global-call-status').textContent = "Qo'ng'iroq davom etmoqda...";

    // Set caller avatar in call overlay
    var aImg = document.getElementById('global-call-avatar-img');
    var aLet = document.getElementById('global-call-avatar-letter');
    if (data.from_avatar) {
        aImg.src = data.from_avatar; aImg.classList.remove('hidden'); aLet.classList.add('hidden');
    } else {
        aImg.classList.add('hidden'); aLet.classList.remove('hidden');
        aLet.style.display = 'flex'; aLet.textContent = (data.from_name || data.from).charAt(0).toUpperCase();
    }

    var callerUser = data.from;
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        var videoReq = gIsVideoCall;
        navigator.mediaDevices.getUserMedia({ audio: true, video: videoReq })
            .then(function(stream) {
                gLocalStream = stream;
                var lv = document.getElementById('global-local-video');
                lv.srcObject = stream;
                lv.classList.remove('hidden');
                if (gIsVideoCall) {
                    document.getElementById('global-call-status').textContent = "Qo'ng'iroq davom etmoqda...";
                }
                gCreatePeerConnection(stream, callerUser);
                return gPeerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
            })
            .then(function() { return gPeerConnection.createAnswer(); })
            .then(function(answer) { return gPeerConnection.setLocalDescription(answer); })
            .then(function() {
                sendGlobalWsMessage({
                    type: 'call_answer',
                    target: data.from,
                    sdp: gPeerConnection.localDescription
                });
                gStartRemoteStreamMonitor();
            })
            .catch(function(err) {
                document.getElementById('global-call-status').textContent = "Qo'ng'iroqda xatolik: " + (err.message || 'Noma\'lum');
            });
    } else {
        document.getElementById('global-call-status').textContent = "Qo'ng'iroq qo'llab-quvvatlanmaydi";
    }
}

function globalRejectCall() {
    stopGlobalRingtone();
    if (globalPendingCaller) {
        sendGlobalWsMessage({ type: 'call_reject', target: globalPendingCaller.from });
    }
    hideIncomingCallGlobal();
}

// ==================== RINGTONE ====================

function startGlobalRingtone() {
    try {
        globalRingtoneCtx = new (window.AudioContext || window.webkitAudioContext)();
        globalRingtoneGain = globalRingtoneCtx.createGain();
        globalRingtoneGain.gain.value = 0.3;
        globalRingtoneGain.connect(globalRingtoneCtx.destination);
        var isFirst = true;
        globalRingtoneInterval = setInterval(function() {
            if (globalRingtoneOsc) { globalRingtoneOsc.stop(); globalRingtoneOsc.disconnect(); }
            globalRingtoneOsc = globalRingtoneCtx.createOscillator();
            globalRingtoneOsc.type = 'sine';
            globalRingtoneOsc.frequency.value = isFirst ? 440 : 480;
            globalRingtoneOsc.connect(globalRingtoneGain);
            globalRingtoneOsc.start();
            isFirst = !isFirst;
        }, 500);
        setTimeout(function() {
            if (globalRingtoneInterval) clearInterval(globalRingtoneInterval);
            if (globalRingtoneOsc) { globalRingtoneOsc.stop(); globalRingtoneOsc.disconnect(); }
        }, 30000);
    } catch(e) {}
}

function stopGlobalRingtone() {
    if (globalRingtoneInterval) { clearInterval(globalRingtoneInterval); globalRingtoneInterval = null; }
    if (globalRingtoneOsc) { globalRingtoneOsc.stop(); globalRingtoneOsc.disconnect(); globalRingtoneOsc = null; }
    if (globalRingtoneCtx) { globalRingtoneCtx.close(); globalRingtoneCtx = null; }
}

// ==================== SMS NOTIFICATIONS ====================

function playSmsSound() {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.4);
        setTimeout(function() { ctx.close(); }, 500);
    } catch(e) {}
}

function pollSmsNotifications() {
    fetch('/notifications/')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.senders && data.senders.length > 0 && data.count > 0) {
                data.senders.forEach(function(s) {
                    if (s.last_message_id && !seenMsgIds[s.last_message_id]) {
                        seenMsgIds[s.last_message_id] = true;
                        showSmsBanner(s);
                    }
                });
            }
        })
        .catch(function() {});
}

function showSmsBanner(sender) {
    var callBanner = document.getElementById('call-top-banner');
    if (!callBanner.classList.contains('hidden')) return;

    smsCurrentMsgId = sender.last_message_id;
    smsCurrentUsername = sender.username;
    document.getElementById('sms-sender-name').textContent = sender.first_name || sender.username;
    document.getElementById('sms-message-text').textContent = sender.last_message;
    var img = document.getElementById('sms-sender-img');
    var letter = document.getElementById('sms-sender-letter');
    if (sender.avatar) {
        img.src = sender.avatar; img.classList.remove('hidden'); letter.classList.add('hidden');
    } else {
        img.classList.add('hidden'); letter.classList.remove('hidden');
        letter.style.display = 'flex'; letter.textContent = (sender.first_name || sender.username).charAt(0).toUpperCase();
    }
    document.getElementById('sms-reply-box').classList.add('hidden');
    var banner = document.getElementById('sms-top-banner');
    banner.classList.remove('hidden');
    banner.style.transform = 'translateY(0)';
    playSmsSound();
    if (smsBannerTimeout) clearTimeout(smsBannerTimeout);
    smsBannerTimeout = setTimeout(function() { hideSmsBanner(); }, 3000);
}

function hideSmsBanner() {
    var banner = document.getElementById('sms-top-banner');
    banner.style.transform = 'translateY(-100%)';
    setTimeout(function() { banner.classList.add('hidden'); }, 300);
    document.getElementById('sms-reply-box').classList.add('hidden');
    if (smsBannerTimeout) { clearTimeout(smsBannerTimeout); smsBannerTimeout = null; }
}

function smsLike() {
    if (smsCurrentMsgId) {
        var fd = new FormData();
        fd.append('emoji', '❤');
        fd.append('csrfmiddlewaretoken', getCSRFToken());
        fetch('/msg/react/' + smsCurrentMsgId + '/', {
            method: 'POST',
            body: fd,
            headers: { 'X-CSRFToken': getCSRFToken() }
        }).then(function() { hideSmsBanner(); });
    }
}

function smsReply() {
    document.getElementById('sms-reply-box').classList.remove('hidden');
    document.getElementById('sms-reply-input').focus();
    if (smsBannerTimeout) { clearTimeout(smsBannerTimeout); smsBannerTimeout = null; }
}

function smsSendReply() {
    var input = document.getElementById('sms-reply-input');
    var text = input.value.trim();
    if (text && smsCurrentUsername) {
        var fd = new FormData();
        fd.append('content', text);
        fd.append('csrfmiddlewaretoken', getCSRFToken());
        fetch('/chat/' + smsCurrentUsername + '/', {
            method: 'POST',
            body: fd,
            headers: { 'X-CSRFToken': getCSRFToken() }
        }).then(function() { input.value = ''; hideSmsBanner(); });
    }
}
